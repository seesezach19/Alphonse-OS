services:
  postgres:
    image: postgres@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    environment:
      POSTGRES_DB: alphonse_kernel
      POSTGRES_USER: alphonse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?generated by installer}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphonse -d alphonse_kernel"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - kernel-postgres-data:/var/lib/postgresql/data

  diagnostic-bootstrap:
    build:
      context: .
    command: ["node", "src/diagnostic-db-bootstrap.js"]
    environment:
      ADMIN_DATABASE_URL: postgresql://alphonse:${POSTGRES_PASSWORD}@postgres:5432/alphonse_kernel
      KERNEL_DATABASE_NAME: alphonse_kernel
      DIAGNOSTIC_DATABASE_NAME: alphonse_diagnostic
      DIAGNOSTIC_DATABASE_ROLE: alphonse_diagnostic
      DIAGNOSTIC_DATABASE_PASSWORD: ${DIAGNOSTIC_DATABASE_PASSWORD:?generated by installer}
    depends_on:
      postgres:
        condition: service_healthy

  kernel:
    build:
      context: .
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://alphonse:${POSTGRES_PASSWORD}@postgres:5432/alphonse_kernel
      DIAGNOSTIC_DATABASE_URL: postgresql://alphonse_diagnostic:${DIAGNOSTIC_DATABASE_PASSWORD}@postgres:5432/alphonse_diagnostic
      DIAGNOSTIC_ARTIFACT_ROOT: /var/lib/alphonse-diagnostics
      DIAGNOSTIC_RUNTIME_ADAPTER_ID: alphonse.n8n.runtime
      DIAGNOSTIC_RUNTIME_ADAPTER_VERSION: 0.2.0
      DIAGNOSTIC_RUNTIME_ADAPTER_KEY_ID: n8n-runtime-key-v1
      DIAGNOSTIC_RUNTIME_ADAPTER_SECRET: ${DIAGNOSTIC_RUNTIME_ADAPTER_SECRET:?generated by installer}
      DIAGNOSTIC_RUNTIME_TIMESTAMP_TOLERANCE_SECONDS: 300
      DIAGNOSTIC_RUNTIME_DETAIL_URL: http://n8n-runtime-adapter:5680
      DIAGNOSTIC_RUNTIME_DETAIL_TOKEN: ${N8N_DETAIL_ADAPTER_TOKEN:?generated by installer}
      DIAGNOSTIC_RUNTIME_DETAIL_POLICY: '{"policy_id":"alphonse.runtime.n8n.detail.v1","extract_paths":["input.order","input.customer_email","fixtures","output"],"redact_paths":["input.customer_email"],"omit_paths":["credentials","runtime.logs","input.internal_notes"],"replacement":"[REDACTED]"}'
      N8N_REPAIR_DELIVERY_URL: http://n8n-runtime-adapter:5680/api/v1
      N8N_REPAIR_DELIVERY_API_KEY: ${N8N_REPAIR_DELIVERY_API_KEY:?generated by installer}
      N8N_REPAIR_DELIVERY_CREDENTIAL_BINDING_REF: customer-secret-store:n8n-repair-v1
      N8N_REPAIR_DELIVERY_TIMEOUT_MS: 5000
      VERIFICATION_RUNNER_ID: 00000000-0000-4000-8000-000000000700
      VERIFICATION_RUNNER_VERSION: 0.2.0
      VERIFICATION_FIXTURE_VERSION: inventory-v1
      VERIFICATION_RUNNER_SIGNING_KEY_ID: local-verification-runner-key-v1
      VERIFICATION_RUNNER_SIGNING_SECRET: ${VERIFICATION_RUNNER_SIGNING_SECRET:?generated by installer}
      KERNEL_INSTALLATION_ID: ${KERNEL_INSTALLATION_ID}
      KERNEL_INSTALLATION_NAME: ${KERNEL_INSTALLATION_NAME}
      KERNEL_ENVIRONMENT_ID: ${KERNEL_ENVIRONMENT_ID}
      KERNEL_ENVIRONMENT_NAME: ${KERNEL_ENVIRONMENT_NAME}
      KERNEL_ENVIRONMENT_CLASS: development
      KERNEL_BOOTSTRAP_TOKEN: ${KERNEL_BOOTSTRAP_TOKEN:?generated by installer}
      KERNEL_BOOTSTRAP_PRINCIPAL_ID: local-bootstrap-owner
      KERNEL_PACKAGE_SIGNING_SECRET: ${KERNEL_PACKAGE_SIGNING_SECRET:?generated by installer}
      KERNEL_PACKAGE_SIGNING_KEY_ID: local-package-signing-key-v1
      KERNEL_WORKLOAD_GRANT_SIGNING_SECRET: ${KERNEL_WORKLOAD_GRANT_SIGNING_SECRET:?generated by installer}
      KERNEL_WORKLOAD_GRANT_SIGNING_KEY_ID: local-workload-grant-key-v1
      SUBSTRATE_SERVICE_TOKEN: ${SUBSTRATE_SERVICE_TOKEN:?generated by installer}
      SUBSTRATE_OBSERVATION_SECRET: ${SUBSTRATE_OBSERVATION_SECRET:?generated by installer}
      SUBSTRATE_OBSERVATION_KEY_ID: local-substrate-observation-key-v1
      DISPATCH_PERMIT_SIGNING_SECRET: ${DISPATCH_PERMIT_SIGNING_SECRET:?generated by installer}
      DISPATCH_PERMIT_SIGNING_KEY_ID: local-dispatch-permit-key-v1
      TRUSTED_ADAPTER_URL: http://trusted-adapter-not-configured:3400
      KERNEL_ADAPTER_TOKEN: ${KERNEL_ADAPTER_TOKEN:?generated by installer}
      BROKER_SERVICE_TOKEN: ${BROKER_SERVICE_TOKEN:?generated by installer}
      DATA_PLANE_SERVICE_TOKEN: ${DATA_PLANE_SERVICE_TOKEN:?generated by installer}
      DATA_PLANE_RECEIPT_SECRET: ${DATA_PLANE_RECEIPT_SECRET:?generated by installer}
      KERNEL_SUPPORT_DIAGNOSTIC_SECRET: ${KERNEL_SUPPORT_DIAGNOSTIC_SECRET:?generated by installer}
      DATA_PLANE_ID: reference-data-plane
    ports:
      - "127.0.0.1:${KERNEL_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      diagnostic-bootstrap:
        condition: service_completed_successfully
      n8n-runtime-adapter:
        condition: service_healthy
    volumes:
      - diagnostic-artifacts:/var/lib/alphonse-diagnostics
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

  n8n-runtime-adapter:
    image: node@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    command: ["node", "/package/src/detail-adapter-server.js"]
    environment:
      PORT: 5680
      N8N_DETAIL_ADAPTER_TOKEN: ${N8N_DETAIL_ADAPTER_TOKEN:?generated by installer}
      N8N_REPAIR_API_KEY: ${N8N_REPAIR_DELIVERY_API_KEY:?generated by installer}
    volumes:
      - ./packages/n8n-operational-package:/package:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5680/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

  n8n:
    image: n8nio/n8n@sha256:761374d4eb841b0a22771d6bd68f0e8d827b4979ae4e490045517b13fc1259dd
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_DIAGNOSTICS_ENABLED: false
      N8N_PERSONALIZATION_ENABLED: false
      N8N_VERSION_NOTIFICATIONS_ENABLED: false
      N8N_BLOCK_ENV_ACCESS_IN_NODE: false
      NODE_FUNCTION_ALLOW_BUILTIN: crypto
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?generated by installer}
      ALPHONSE_WORKFLOW_ID: workflow:inventory-follow-up
      ALPHONSE_REVISION_ID: 00000000-0000-4000-8000-000000000000
      ALPHONSE_RUNTIME_ADAPTER_KEY_ID: n8n-runtime-key-v1
      ALPHONSE_RUNTIME_ADAPTER_SECRET: ${DIAGNOSTIC_RUNTIME_ADAPTER_SECRET:?generated by installer}
      ALPHONSE_RUNTIME_EVENT_URL: http://kernel:3000/diagnostic/v0/runtime-events
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-customer-data:/home/node/.n8n
      - ./packages/n8n-operational-package:/package:ro
    depends_on:
      kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5678/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  kernel-postgres-data:
  diagnostic-artifacts:
  n8n-customer-data:
