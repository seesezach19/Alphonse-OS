services:
  postgres:
    image: postgres@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    environment:
      POSTGRES_DB: alphonse_kernel
      POSTGRES_USER: alphonse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?generated by installer}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphonse -d alphonse_kernel"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - kernel-postgres-data:/var/lib/postgresql/data

  kernel:
    build:
      context: .
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://alphonse:${POSTGRES_PASSWORD}@postgres:5432/alphonse_kernel
      KERNEL_INSTALLATION_ID: ${KERNEL_INSTALLATION_ID}
      KERNEL_INSTALLATION_NAME: ${KERNEL_INSTALLATION_NAME}
      KERNEL_ENVIRONMENT_ID: ${KERNEL_ENVIRONMENT_ID}
      KERNEL_ENVIRONMENT_NAME: ${KERNEL_ENVIRONMENT_NAME}
      KERNEL_ENVIRONMENT_CLASS: development
      KERNEL_BOOTSTRAP_TOKEN: ${KERNEL_BOOTSTRAP_TOKEN:?generated by installer}
      KERNEL_BOOTSTRAP_PRINCIPAL_ID: local-bootstrap-operator
      KERNEL_PACKAGE_SIGNING_SECRET: ${KERNEL_PACKAGE_SIGNING_SECRET:?generated by installer}
      KERNEL_PACKAGE_SIGNING_KEY_ID: local-package-signing-key-v1
      KERNEL_WORKLOAD_GRANT_SIGNING_SECRET: ${KERNEL_WORKLOAD_GRANT_SIGNING_SECRET:?generated by installer}
      KERNEL_WORKLOAD_GRANT_SIGNING_KEY_ID: local-workload-grant-key-v1
      SUBSTRATE_SERVICE_TOKEN: ${SUBSTRATE_SERVICE_TOKEN:?generated by installer}
      SUBSTRATE_OBSERVATION_SECRET: ${SUBSTRATE_OBSERVATION_SECRET:?generated by installer}
      SUBSTRATE_OBSERVATION_KEY_ID: local-substrate-observation-key-v1
      DISPATCH_PERMIT_SIGNING_SECRET: ${DISPATCH_PERMIT_SIGNING_SECRET:?generated by installer}
      DISPATCH_PERMIT_SIGNING_KEY_ID: local-dispatch-permit-key-v1
      TRUSTED_ADAPTER_URL: http://trusted-adapter:3400
      KERNEL_ADAPTER_TOKEN: ${KERNEL_ADAPTER_TOKEN:?generated by installer}
      BROKER_SERVICE_TOKEN: ${BROKER_SERVICE_TOKEN:?generated by installer}
      DATA_PLANE_SERVICE_TOKEN: ${DATA_PLANE_SERVICE_TOKEN:?generated by installer}
      DATA_PLANE_RECEIPT_SECRET: ${DATA_PLANE_RECEIPT_SECRET:?generated by installer}
      KERNEL_SUPPORT_DIAGNOSTIC_SECRET: ${KERNEL_SUPPORT_DIAGNOSTIC_SECRET:?generated by installer}
      DATA_PLANE_ID: reference-data-plane
    ports:
      - "127.0.0.1:${KERNEL_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

  data-plane:
    build:
      context: .
    command: ["node", "src/data-plane-server.js"]
    environment:
      DATA_PLANE_PORT: 3100
      KERNEL_INTERNAL_URL: http://kernel:3000
      DATA_PLANE_SERVICE_TOKEN: ${DATA_PLANE_SERVICE_TOKEN}
      DATA_PLANE_RECEIPT_SECRET: ${DATA_PLANE_RECEIPT_SECRET}
    ports:
      - "127.0.0.1:${DATA_PLANE_PORT:-3100}:3100"
    depends_on:
      kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

  storefront-staging:
    build:
      context: .
    command: ["node", "src/storefront-staging-server.js"]
    environment:
      PORT: 3200
      STOREFRONT_CREDENTIAL_ISSUER_SECRET: ${STOREFRONT_CREDENTIAL_ISSUER_SECRET}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3200/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

  credential-broker:
    build:
      context: .
    command: ["node", "src/credential-broker-server.js"]
    environment:
      PORT: 3300
      ADAPTER_BROKER_TOKEN: ${ADAPTER_BROKER_TOKEN}
      STOREFRONT_CREDENTIAL_ISSUER_SECRET: ${STOREFRONT_CREDENTIAL_ISSUER_SECRET}
      DISPATCH_PERMIT_SIGNING_SECRET: ${DISPATCH_PERMIT_SIGNING_SECRET}
      KERNEL_INTERNAL_URL: http://kernel:3000
      BROKER_SERVICE_TOKEN: ${BROKER_SERVICE_TOKEN}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3300/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

  trusted-adapter:
    build:
      context: .
    command: ["node", "src/trusted-adapter-server.js"]
    environment:
      PORT: 3400
      KERNEL_ADAPTER_TOKEN: ${KERNEL_ADAPTER_TOKEN}
      ADAPTER_BROKER_TOKEN: ${ADAPTER_BROKER_TOKEN}
      CREDENTIAL_BROKER_URL: http://credential-broker:3300
      STOREFRONT_URL: http://storefront-staging:3200
      STOREFRONT_SYSTEM: storefront-staging
    depends_on:
      kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3400/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  kernel-postgres-data:
