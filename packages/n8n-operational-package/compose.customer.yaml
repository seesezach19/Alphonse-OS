services:
  kernel:
    environment:
      DIAGNOSTIC_RUNTIME_DETAIL_URL: http://n8n-runtime-adapter:5680
      DIAGNOSTIC_RUNTIME_DETAIL_TOKEN: ${N8N_DETAIL_ADAPTER_TOKEN:-local-n8n-detail-adapter-token-v1}
      DIAGNOSTIC_RUNTIME_DETAIL_POLICY: '{"policy_id":"alphonse.runtime.n8n.detail.v1","extract_paths":["input.order","input.customer_email","fixtures","output"],"redact_paths":["input.customer_email"],"omit_paths":["credentials","runtime.logs","input.internal_notes"],"replacement":"[REDACTED]"}'
      N8N_REPAIR_DELIVERY_URL: ${N8N_REPAIR_DELIVERY_URL:-http://n8n-runtime-adapter:5680/api/v1}
      N8N_REPAIR_DELIVERY_API_KEY: ${N8N_REPAIR_DELIVERY_API_KEY:-local-customer-owned-n8n-api-key-v1}
      N8N_REPAIR_DELIVERY_CREDENTIAL_BINDING_REF: ${N8N_REPAIR_DELIVERY_CREDENTIAL_BINDING_REF:-customer-secret-store:n8n-repair-v1}
      N8N_REPAIR_DELIVERY_TIMEOUT_MS: ${N8N_REPAIR_DELIVERY_TIMEOUT_MS:-5000}
    volumes:
      - ./packages/n8n-operational-package:/app/packages/n8n-operational-package:ro
    depends_on:
      n8n-runtime-adapter:
        condition: service_healthy

  n8n-runtime-adapter:
    image: node@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    command: ["node", "/package/src/detail-adapter-server.js"]
    environment:
      PORT: 5680
      N8N_DETAIL_ADAPTER_TOKEN: ${N8N_DETAIL_ADAPTER_TOKEN:-local-n8n-detail-adapter-token-v1}
      N8N_REPAIR_API_KEY: ${N8N_REPAIR_DELIVERY_API_KEY:-local-customer-owned-n8n-api-key-v1}
      N8N_ADAPTER_TEST_CONTROLS_ENABLED: "true"
      N8N_ADAPTER_STATE_FILE: /var/lib/alphonse-n8n-adapter/state.json
      N8N_API_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_INVENTORY_CURSOR_SECRET: ${N8N_INVENTORY_CURSOR_SECRET:-local-n8n-inventory-cursor-secret-with-sufficient-length-v1}
      N8N_INVENTORY_SCOPE: '${N8N_INVENTORY_SCOPE:-{"scope_id":"n8n:customer-primary","environment":"local","project_id":null,"active":null,"allowed_workflow_ids":[]}}'
      N8N_ATTESTATION_BINDINGS: '{"InventoryDefect1":{"workflow_id":"workflow:inventory-follow-up","revision_id":"${ALPHONSE_REVISION_ID:-00000000-0000-4000-8000-000000000000}","execution_workflow_material_digest":"${N8N_EXECUTION_WORKFLOW_MATERIAL_DIGEST:-sha256:637f6033e8dcd5bd15e5e10f2043cd93d9f972ec0de105b9bc4c6213d3ff1841}","fingerprint_rules_digest":"${N8N_FINGERPRINT_RULES_DIGEST:-sha256:a301859f43ad4f171e6a8849b360d8a2e98f273add09e736b016534bec5050bd}"}}'
      ALPHONSE_RUNTIME_EVENT_URL: http://kernel:3000/diagnostic/v0/runtime-events
      ALPHONSE_RUNTIME_ADAPTER_ID: alphonse.n8n.runtime
      ALPHONSE_RUNTIME_ADAPTER_VERSION: 0.3.0
      ALPHONSE_RUNTIME_ADAPTER_KEY_ID: ${ALPHONSE_RUNTIME_ADAPTER_KEY_ID:-n8n-runtime-key-v1}
      ALPHONSE_RUNTIME_ADAPTER_SECRET: ${ALPHONSE_RUNTIME_ADAPTER_SECRET:-local-n8n-runtime-event-secret-with-sufficient-length-v1}
    volumes:
      - ./packages/n8n-operational-package:/package:ro
      - n8n-adapter-state:/var/lib/alphonse-n8n-adapter
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5680/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 20

  n8n:
    image: n8nio/n8n@sha256:761374d4eb841b0a22771d6bd68f0e8d827b4979ae4e490045517b13fc1259dd
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_DIAGNOSTICS_ENABLED: false
      N8N_PERSONALIZATION_ENABLED: false
      N8N_VERSION_NOTIFICATIONS_ENABLED: false
      N8N_BLOCK_ENV_ACCESS_IN_NODE: true
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-customer-owned-local-n8n-encryption-key-v1}
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-customer-data:/home/node/.n8n
      - ./packages/n8n-operational-package:/package:ro
    depends_on:
      kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5678/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  n8n-customer-data:
  n8n-adapter-state:
