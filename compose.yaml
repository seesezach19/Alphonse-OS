services:
  postgres:
    image: postgres@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    environment:
      POSTGRES_DB: alphonse_kernel
      POSTGRES_USER: alphonse
      POSTGRES_PASSWORD: local-development-only
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphonse -d alphonse_kernel"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - kernel-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/001-registry-role.sql:ro

  diagnostic-bootstrap:
    build:
      context: .
    command: ["node", "src/diagnostic-db-bootstrap.js"]
    environment:
      ADMIN_DATABASE_URL: postgresql://alphonse:local-development-only@postgres:5432/alphonse_kernel
      KERNEL_DATABASE_NAME: alphonse_kernel
      DIAGNOSTIC_DATABASE_NAME: alphonse_diagnostic
      DIAGNOSTIC_DATABASE_ROLE: alphonse_diagnostic
      DIAGNOSTIC_DATABASE_PASSWORD: local-diagnostic-only
      TOKENIZATION_DATABASE_ROLE: alphonse_tokenization
      TOKENIZATION_DATABASE_PASSWORD: local-tokenization-only
    depends_on:
      postgres:
        condition: service_healthy

  kernel:
    build:
      context: .
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://alphonse:local-development-only@postgres:5432/alphonse_kernel
      DIAGNOSTIC_DATABASE_URL: postgresql://alphonse_diagnostic:local-diagnostic-only@postgres:5432/alphonse_diagnostic
      DIAGNOSTIC_ARTIFACT_ROOT: /var/lib/alphonse-diagnostics
      DIAGNOSTIC_RUNTIME_ADAPTER_ID: ${DIAGNOSTIC_RUNTIME_ADAPTER_ID:-fixture.workflow-runtime}
      DIAGNOSTIC_RUNTIME_ADAPTER_VERSION: ${DIAGNOSTIC_RUNTIME_ADAPTER_VERSION:-0.2.0}
      DIAGNOSTIC_RUNTIME_ADAPTER_KEY_ID: ${DIAGNOSTIC_RUNTIME_ADAPTER_KEY_ID:-fixture-runtime-key-v1}
      DIAGNOSTIC_RUNTIME_ADAPTER_SECRET: ${DIAGNOSTIC_RUNTIME_ADAPTER_SECRET:-local-runtime-event-secret-with-sufficient-length-v1}
      DIAGNOSTIC_RUNTIME_TIMESTAMP_TOLERANCE_SECONDS: 300
      KERNEL_INSTALLATION_ID: 00000000-0000-4000-8000-00000000a001
      KERNEL_INSTALLATION_NAME: Local Installation
      KERNEL_ENVIRONMENT_ID: 00000000-0000-4000-8000-000000000001
      KERNEL_ENVIRONMENT_NAME: Local Development
      KERNEL_ENVIRONMENT_CLASS: development
      KERNEL_BOOTSTRAP_TOKEN: local-development-bootstrap-token
      KERNEL_OWNER_TOKEN: ${KERNEL_OWNER_TOKEN:-local-development-bootstrap-token}
      KERNEL_BOOTSTRAP_PRINCIPAL_ID: local-bootstrap-operator
      KERNEL_PACKAGE_SIGNING_SECRET: local-package-signing-secret
      KERNEL_PACKAGE_SIGNING_KEY_ID: local-package-signing-key-v1
      KERNEL_WORKLOAD_GRANT_SIGNING_SECRET: local-workload-grant-signing-secret
      KERNEL_WORKLOAD_GRANT_SIGNING_KEY_ID: local-workload-grant-key-v1
      SUBSTRATE_SERVICE_TOKEN: local-substrate-service-token
      SUBSTRATE_OBSERVATION_SECRET: local-substrate-observation-secret
      SUBSTRATE_OBSERVATION_KEY_ID: local-substrate-observation-key-v1
      DISPATCH_PERMIT_SIGNING_SECRET: local-dispatch-permit-signing-secret
      DISPATCH_PERMIT_SIGNING_KEY_ID: local-dispatch-permit-key-v1
      TRUSTED_ADAPTER_URL: http://trusted-adapter:3400
      KERNEL_ADAPTER_TOKEN: local-kernel-adapter-token
      ADAPTER_DISPATCH_TIMEOUT_MS: 250
      BROKER_SERVICE_TOKEN: local-broker-service-token
      DATA_PLANE_SERVICE_TOKEN: local-data-plane-service-token
      DATA_PLANE_RECEIPT_SECRET: local-data-plane-receipt-secret
      KERNEL_SUPPORT_DIAGNOSTIC_SECRET: local-support-diagnostic-encryption-secret-v1
      KERNEL_GRANT_SNAPSHOT_SIGNING_KEY_ID: local-kernel-grant-snapshot-key-v1
      KERNEL_GRANT_SNAPSHOT_SIGNING_SECRET: local-kernel-grant-snapshot-secret-with-sufficient-length-v1
      DIAGNOSTIC_GRANT_APPLICATION_SIGNING_KEY_ID: local-diagnostic-grant-application-key-v1
      DIAGNOSTIC_GRANT_APPLICATION_SIGNING_SECRET: local-diagnostic-grant-application-secret-with-sufficient-length-v1
      GRANT_AUTHORITY_FEED_TOKEN: local-grant-authority-feed-token
      GRANT_APPLICATION_RECEIPT_SERVICE_TOKEN: local-grant-application-receipt-token
      DIAGNOSTIC_OBSERVER_KEYS: '{"observer-webhook-key-v1":"observer-webhook-secret-with-sufficient-length-v1","observer-runtime-key-v1":"observer-runtime-secret-with-sufficient-length-v1","observer-crm-key-v1":"observer-crm-secret-with-sufficient-length-v1","observer-n8n-key-v1":"observer-n8n-secret-with-sufficient-length-v1","observer-crm-request-key-v1":"observer-crm-request-secret-with-sufficient-length-v1","observer-crm-ledger-key-v1":"observer-crm-ledger-secret-with-sufficient-length-v1"}'
      TOKENIZATION_GRANT_APPLICATION_SIGNING_KEY_ID: local-tokenization-grant-application-key-v1
      TOKENIZATION_GRANT_APPLICATION_SIGNING_SECRET: local-tokenization-grant-application-secret-with-sufficient-length-v1
      TOKENIZATION_SERVICE_SIGNING_KEY_ID: local-tokenization-service-ed25519-v1
      TOKENIZATION_SERVICE_PUBLIC_KEY_DER_BASE64: MCowBQYDK2VwAyEAd3J+TM4tUSgFYA35F1emcJ2zGrmunrS8ynmYe6aCCYE=
      DIAGNOSTIC_TOKENIZATION_RESULT_TOKEN: local-tokenization-result-submission-token
      KERNEL_DIAGNOSTIC_DISPATCH_SIGNING_KEY_ID: local-diagnostic-dispatch-key-v1
      KERNEL_DIAGNOSTIC_DISPATCH_SIGNING_SECRET: local-diagnostic-dispatch-signing-secret-with-sufficient-length-v1
      DIAGNOSTIC_DISPATCHER_AUDIENCE: diagnostic-dispatcher:v0.1
      DIAGNOSTIC_RUNNER_AUDIENCES: '["diagnostic-runner:v0.1"]'
      DIAGNOSTIC_MODEL_BROKER_GRANT_KEY_ID: local-diagnostic-broker-grant-key-v1
      DIAGNOSTIC_MODEL_BROKER_GRANT_SIGNING_SECRET: local-diagnostic-broker-grant-signing-secret-with-sufficient-length-v1
      DIAGNOSTIC_MODEL_BROKER_RECEIPT_KEY_ID: local-diagnostic-broker-receipt-key-v1
      DIAGNOSTIC_MODEL_BROKER_RECEIPT_SECRET: local-diagnostic-broker-receipt-secret-with-sufficient-length-v1
      DIAGNOSTIC_RUNNER_ATTESTATION_KEY_ID: local-diagnostic-runner-attestation-key-v1
      DIAGNOSTIC_RUNNER_ATTESTATION_SECRET: local-diagnostic-runner-attestation-secret-with-sufficient-length-v1
      VERIFICATION_RUNNER_ID: 00000000-0000-4000-8000-000000000700
      VERIFICATION_RUNNER_VERSION: 0.2.0
      VERIFICATION_FIXTURE_VERSION: inventory-v1
      VERIFICATION_RUNNER_SIGNING_KEY_ID: local-verification-runner-key-v1
      VERIFICATION_RUNNER_SIGNING_SECRET: local-verification-runner-signing-secret-v1
      DATA_PLANE_ID: reference-data-plane
    ports:
      - "127.0.0.1:${KERNEL_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      diagnostic-bootstrap:
        condition: service_completed_successfully
    volumes:
      - diagnostic-artifacts:/var/lib/alphonse-diagnostics
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 20

  tokenization-service:
    profiles: ["canonical-tokenization"]
    build:
      context: .
    command: ["node", "src/tokenization-service-server.js"]
    environment:
      TOKENIZATION_PORT: 3500
      DIAGNOSTIC_DATABASE_URL: postgresql://alphonse_tokenization:local-tokenization-only@postgres:5432/alphonse_diagnostic
      KERNEL_INSTALLATION_ID: 00000000-0000-4000-8000-00000000a001
      KERNEL_ENVIRONMENT_ID: 00000000-0000-4000-8000-000000000001
      KERNEL_GRANT_SNAPSHOT_SIGNING_KEY_ID: local-kernel-grant-snapshot-key-v1
      KERNEL_GRANT_SNAPSHOT_SIGNING_SECRET: local-kernel-grant-snapshot-secret-with-sufficient-length-v1
      TOKENIZATION_GRANT_APPLICATION_SIGNING_KEY_ID: local-tokenization-grant-application-key-v1
      TOKENIZATION_GRANT_APPLICATION_SIGNING_SECRET: local-tokenization-grant-application-secret-with-sufficient-length-v1
      GRANT_AUTHORITY_FEED_TOKEN: local-grant-authority-feed-token
      TOKENIZATION_SERVICE_SIGNING_KEY_ID: local-tokenization-service-ed25519-v1
      TOKENIZATION_SERVICE_PRIVATE_KEY_DER_BASE64: MC4CAQAwBQYDK2VwBCIEID6S6GMVo8K+m7qRAsy60widyVhn9uoh7GmOj3QsHfhR
      TOKENIZATION_ROOT_SECRET: local-tokenization-domain-root-secret-with-sufficient-length-v1
      TOKENIZATION_REQUESTER_TOKENS: '{"observer:webhook-ingress":"local-webhook-tokenization-requester-token","observer:crm-request":"local-crm-tokenization-requester-token"}'
      DIAGNOSTIC_TOKENIZATION_RESULT_URL: http://kernel:3000/diagnostic/internal/v0/tokenization-result-receipts
      DIAGNOSTIC_TOKENIZATION_RESULT_TOKEN: local-tokenization-result-submission-token
    ports:
      - "127.0.0.1:${TOKENIZATION_PORT:-3500}:3500"
    depends_on:
      kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3500/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 20

  customer-ingress-bootstrap:
    profiles: ["canonical-ingress"]
    build:
      context: .
    command: ["node", "src/customer-ingress-db-bootstrap.js"]
    environment:
      ADMIN_DATABASE_URL: postgresql://alphonse:local-development-only@postgres:5432/alphonse_kernel
      INGRESS_DATABASE_NAME: alphonse_ingress
      INGRESS_DATABASE_ROLE: alphonse_ingress
      INGRESS_DATABASE_PASSWORD: local-ingress-only
    depends_on:
      postgres:
        condition: service_healthy

  customer-ingress-migrate:
    profiles: ["canonical-ingress"]
    build:
      context: .
    command: ["node", "src/customer-ingress-migrate.js"]
    environment:
      INGRESS_DATABASE_URL: postgresql://alphonse_ingress:local-ingress-only@postgres:5432/alphonse_ingress
    depends_on:
      customer-ingress-bootstrap:
        condition: service_completed_successfully

  canonical-n8n:
    profiles: ["canonical-ingress"]
    image: n8nio/n8n@sha256:761374d4eb841b0a22771d6bd68f0e8d827b4979ae4e490045517b13fc1259dd
    environment:
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_HOST: canonical-n8n
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_ENCRYPTION_KEY: local-canonical-proof-n8n-encryption-key-v1
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
    ports:
      - "127.0.0.1:${CANONICAL_N8N_PORT:-45678}:5678"
    volumes:
      - canonical-n8n-data:/home/node/.n8n
      - ./packages/n8n-operational-package/workflows:/proof-workflows:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5678/healthz"]
      interval: 2s
      timeout: 3s
      retries: 30

  customer-ingress-api:
    profiles: ["canonical-ingress"]
    build:
      context: .
    command: ["node", "src/customer-ingress-server.js"]
    environment:
      INGRESS_PORT: 3600
      INGRESS_DATABASE_URL: postgresql://alphonse_ingress:local-ingress-only@postgres:5432/alphonse_ingress
      INGRESS_STIMULUS_TOKEN: ${INGRESS_STIMULUS_TOKEN:-local-route-scoped-stimulus-token}
      INGRESS_OPERATOR_TOKEN: ${INGRESS_OPERATOR_TOKEN:-local-read-only-ingress-operator-token}
      TOKENIZATION_URL: http://tokenization-service:3500
      TOKENIZATION_REQUESTER_TOKEN: local-webhook-tokenization-requester-token
      TOKENIZATION_REQUESTER_PRINCIPAL_ID: observer:webhook-ingress
      KERNEL_INSTALLATION_ID: 00000000-0000-4000-8000-00000000a001
      KERNEL_ENVIRONMENT_ID: 00000000-0000-4000-8000-000000000001
      INGRESS_INTEGRATION_ID: integration:mock-crm
      INGRESS_SOURCE_TOKENIZATION_GRANT_ID: ${INGRESS_SOURCE_TOKENIZATION_GRANT_ID}
      INGRESS_DELIVERY_TOKENIZATION_GRANT_ID: ${INGRESS_DELIVERY_TOKENIZATION_GRANT_ID}
      INGRESS_SOURCE_BINDING_ID: source-binding:agency-lead-form
      INGRESS_PAYLOAD_SECRET: local-ingress-payload-encryption-secret-v1
      INGRESS_MAPPING_SECRET: local-ingress-mapping-receipt-secret-v1
      INGRESS_RETENTION_CAPACITY_BYTES: 10485760
    ports:
      - "127.0.0.1:${INGRESS_PORT:-45600}:3600"
    depends_on:
      customer-ingress-migrate:
        condition: service_completed_successfully
      tokenization-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3600/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 20

  customer-ingress-forwarder:
    profiles: ["canonical-ingress"]
    build:
      context: .
    command: ["node", "src/customer-ingress-worker.js"]
    environment:
      INGRESS_WORKER_MODE: forwarder
      INGRESS_WORKER_HEALTH_PORT: 3601
      INGRESS_DATABASE_URL: postgresql://alphonse_ingress:local-ingress-only@postgres:5432/alphonse_ingress
      INGRESS_SOURCE_BINDING_ID: source-binding:agency-lead-form
      INGRESS_PAYLOAD_SECRET: local-ingress-payload-encryption-secret-v1
      INGRESS_MAPPING_SECRET: local-ingress-mapping-receipt-secret-v1
      INGRESS_FORWARD_URL: http://canonical-n8n:5678/webhook/agency-lab-lead-ingress
    depends_on:
      customer-ingress-migrate:
        condition: service_completed_successfully
      canonical-n8n:
        condition: service_healthy

  customer-ingress-reporter:
    profiles: ["canonical-ingress"]
    build:
      context: .
    command: ["node", "src/customer-ingress-worker.js"]
    environment:
      INGRESS_WORKER_MODE: reporter
      INGRESS_WORKER_HEALTH_PORT: 3602
      INGRESS_DATABASE_URL: postgresql://alphonse_ingress:local-ingress-only@postgres:5432/alphonse_ingress
      INGRESS_SOURCE_BINDING_ID: source-binding:agency-lead-form
      INGRESS_PAYLOAD_SECRET: local-ingress-payload-encryption-secret-v1
      INGRESS_MAPPING_SECRET: local-ingress-mapping-receipt-secret-v1
      INGRESS_DIAGNOSTIC_URL: ${INGRESS_DIAGNOSTIC_URL:-http://127.0.0.1:9/diagnostic/v0/observations}
      INGRESS_OBSERVER_PRINCIPAL_ID: observer:webhook-ingress
      INGRESS_OBSERVATION_GRANT_ID: ${INGRESS_OBSERVATION_GRANT_ID}
      INGRESS_OBSERVATION_KEY_ID: observer-webhook-key-v1
      INGRESS_OBSERVATION_SECRET: observer-webhook-secret-with-sufficient-length-v1
      INGRESS_OBSERVATION_STREAM_ID: stream:webhook-ingress-journal
      INGRESS_OBSERVATION_SCHEMA: ${INGRESS_OBSERVATION_SCHEMA}
      INGRESS_OBSERVATION_ADAPTER_BINDING: ${INGRESS_OBSERVATION_ADAPTER_BINDING}
      INGRESS_WORKFLOW_ID: workflow:agency-lab:lead-ingestion
      INGRESS_INTEGRATION_ID: integration:mock-crm
      KERNEL_INSTALLATION_ID: 00000000-0000-4000-8000-00000000a001
      KERNEL_ENVIRONMENT_ID: 00000000-0000-4000-8000-000000000001
      INGRESS_TEST_CONTROLS_ENABLED: ${INGRESS_TEST_CONTROLS_ENABLED:-false}
      INGRESS_REPORTER_CRASH_AFTER_ACCEPT_ONCE: ${INGRESS_REPORTER_CRASH_AFTER_ACCEPT_ONCE:-false}
    depends_on:
      customer-ingress-migrate:
        condition: service_completed_successfully

  canonical-observer-volume-init:
    profiles: ["canonical-destination", "canonical-runtime"]
    build: { context: . }
    user: "0:0"
    command: ["node", "src/canonical-volume-init.js", "/binding", "/runtime-state", "/ledger-state"]
    volumes:
      - n8n-runtime-binding:/binding
      - n8n-runtime-observer-state:/runtime-state
      - crm-ledger-observer-state:/ledger-state

  mock-crm-bootstrap:
    profiles: ["canonical-destination"]
    build: { context: . }
    command: ["node", "src/mock-crm-db-bootstrap.js"]
    environment:
      ADMIN_DATABASE_URL: postgresql://alphonse:local-development-only@postgres:5432/alphonse_kernel
      MOCK_CRM_MIGRATION_DATABASE_PASSWORD: local-mock-crm-migration-only
      MOCK_CRM_DATABASE_PASSWORD: local-mock-crm-only
      CRM_GATEWAY_DATABASE_PASSWORD: local-crm-gateway-only
    depends_on:
      postgres: { condition: service_healthy }

  mock-crm-migrate:
    profiles: ["canonical-destination"]
    build: { context: . }
    command: ["node", "src/mock-crm-migrate.js"]
    environment:
      MOCK_CRM_DATABASE_URL: postgresql://alphonse_mock_crm_migrator:local-mock-crm-migration-only@postgres:5432/alphonse_mock_crm
    depends_on:
      mock-crm-bootstrap: { condition: service_completed_successfully }

  mock-crm:
    profiles: ["canonical-destination"]
    build: { context: . }
    command: ["node", "src/mock-crm-server.js"]
    environment:
      MOCK_CRM_PORT: 3701
      MOCK_CRM_DATABASE_URL: postgresql://alphonse_mock_crm:local-mock-crm-only@postgres:5432/alphonse_mock_crm
      MOCK_CRM_WRITE_TOKEN: local-mock-crm-write-token
      MOCK_CRM_LEDGER_TOKEN: local-mock-crm-ledger-read-token
    ports: ["127.0.0.1:${MOCK_CRM_PORT:-43701}:3701"]
    depends_on:
      mock-crm-migrate: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3701/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 20

  crm-request-observer:
    profiles: ["canonical-destination"]
    build: { context: . }
    command: ["node", "src/crm-request-observer-server.js"]
    environment:
      CRM_GATEWAY_PORT: 3700
      CRM_GATEWAY_DATABASE_URL: postgresql://alphonse_crm_gateway:local-crm-gateway-only@postgres:5432/alphonse_mock_crm
      CRM_GATEWAY_ROUTE_TOKEN: local-n8n-crm-route-token
      CRM_GATEWAY_PAYLOAD_SECRET: local-crm-gateway-payload-secret-v1
      MOCK_CRM_URL: http://mock-crm:3701
      MOCK_CRM_WRITE_TOKEN: local-mock-crm-write-token
      TOKENIZATION_URL: http://tokenization-service:3500
      TOKENIZATION_REQUESTER_TOKEN: local-crm-tokenization-requester-token
      CRM_IDEMPOTENCY_TOKENIZATION_GRANT_ID: ${CRM_IDEMPOTENCY_TOKENIZATION_GRANT_ID}
      CRM_REQUEST_DIAGNOSTIC_URL: http://kernel:3000/diagnostic/v0/observations
      CRM_REQUEST_OBSERVATION_SCHEMA: ${CRM_REQUEST_OBSERVATION_SCHEMA}
      CRM_REQUEST_ADAPTER_BINDING: ${CRM_REQUEST_ADAPTER_BINDING}
      CRM_REQUEST_PRINCIPAL_ID: observer:crm-request
      CRM_REQUEST_OBSERVATION_GRANT_ID: ${CRM_REQUEST_OBSERVATION_GRANT_ID}
      CRM_REQUEST_OBSERVATION_KEY_ID: observer-crm-request-key-v1
      CRM_REQUEST_OBSERVATION_SECRET: observer-crm-request-secret-with-sufficient-length-v1
      CRM_REQUEST_STREAM_ID: stream:crm-request
      KERNEL_INSTALLATION_ID: 00000000-0000-4000-8000-00000000a001
      KERNEL_ENVIRONMENT_ID: 00000000-0000-4000-8000-000000000001
    ports: ["127.0.0.1:${CRM_REQUEST_OBSERVER_PORT:-43700}:3700"]
    depends_on:
      mock-crm: { condition: service_healthy }
      tokenization-service: { condition: service_healthy }

  crm-ledger-observer:
    profiles: ["canonical-destination"]
    build: { context: . }
    command: ["node", "src/crm-ledger-observer.js"]
    environment:
      CRM_LEDGER_OBSERVER_PORT: 3702
      MOCK_CRM_URL: http://mock-crm:3701
      MOCK_CRM_LEDGER_TOKEN: local-mock-crm-ledger-read-token
      CRM_LEDGER_OBSERVER_STATE_PATH: /var/lib/alphonse-crm-ledger/state.json
      CRM_LEDGER_DIAGNOSTIC_URL: http://kernel:3000/diagnostic/v0/observations
      CRM_EFFECT_OBSERVATION_SCHEMA: ${CRM_EFFECT_OBSERVATION_SCHEMA}
      CRM_LEDGER_ADAPTER_BINDING: ${CRM_LEDGER_ADAPTER_BINDING}
      CRM_LEDGER_PRINCIPAL_ID: observer:crm-ledger
      CRM_LEDGER_OBSERVATION_GRANT_ID: ${CRM_LEDGER_OBSERVATION_GRANT_ID}
      CRM_LEDGER_OBSERVATION_KEY_ID: observer-crm-ledger-key-v1
      CRM_LEDGER_OBSERVATION_SECRET: observer-crm-ledger-secret-with-sufficient-length-v1
      CRM_LEDGER_STREAM_ID: stream:crm-ledger
      KERNEL_INSTALLATION_ID: 00000000-0000-4000-8000-00000000a001
      KERNEL_ENVIRONMENT_ID: 00000000-0000-4000-8000-000000000001
    ports: ["127.0.0.1:${CRM_LEDGER_OBSERVER_PORT:-43702}:3702"]
    volumes: ["crm-ledger-observer-state:/var/lib/alphonse-crm-ledger"]
    depends_on:
      mock-crm: { condition: service_healthy }
      canonical-observer-volume-init: { condition: service_completed_successfully }

  n8n-runtime-readiness:
    profiles: ["canonical-runtime"]
    build: { context: . }
    command: ["node", "src/canonical-n8n-readiness.js"]
    environment:
      N8N_API_URL: http://canonical-n8n:5678
      N8N_API_KEY: ${CANONICAL_N8N_API_KEY}
      N8N_PROVIDER_WORKFLOW_ID: CanonicalLeadIngress01
      ALPHONSE_WORKFLOW_ID: workflow:agency-lab:lead-ingestion
      ALPHONSE_REVISION_ID: ${CANONICAL_AGENT_REVISION_ID}
      ALPHONSE_REPORTING_GRANT_ID: ${N8N_REPORTING_GRANT_ID}
      KERNEL_API_URL: http://kernel:3000
      KERNEL_READ_TOKEN: ${KERNEL_OWNER_TOKEN:-local-development-bootstrap-token}
      N8N_READINESS_EXECUTION_ID: ${N8N_READINESS_EXECUTION_ID}
      N8N_RUNTIME_IDENTITY: ${N8N_RUNTIME_IDENTITY}
      N8N_NODE_METADATA_PATH: /node-metadata/n8n-2.25.7.json
      N8N_BINDING_PATH: /var/lib/alphonse-n8n-binding/binding.json
    volumes:
      - ./packages/n8n-operational-package/node-metadata:/node-metadata:ro
      - n8n-runtime-binding:/var/lib/alphonse-n8n-binding
    depends_on:
      canonical-n8n: { condition: service_healthy }
      canonical-observer-volume-init: { condition: service_completed_successfully }

  n8n-runtime-observer:
    profiles: ["canonical-runtime"]
    build: { context: . }
    command: ["node", "src/canonical-n8n-observer.js"]
    environment:
